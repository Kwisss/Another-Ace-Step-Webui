<details {% if musical_meta_open %}open{% endif %}>
  <summary>Musical Metadata</summary>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="audio_duration">Duration (sec)</label>
      <input type="number" name="audio_duration" id="audio_duration" placeholder="Auto" min="10" max="600" step="1">
    </div>
    <div class="form-group">
      <label class="form-label" for="bpm">BPM</label>
      <input type="number" name="bpm" id="bpm" placeholder="Auto" min="30" max="300" step="1">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="key_scale">Key & Scale</label>
      <input type="text" name="key_scale" id="key_scale" placeholder="auto e.g. C Major">
    </div>
    <div class="form-group">
      <label class="form-label" for="time_signature">Time Signature</label>
      <select name="time_signature" id="time_signature">
        <option value="">Auto</option>
        <option value="2">2/4</option>
        <option value="3">3/4</option>
        <option value="4" selected>4/4</option>
        <option value="6">6/8</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="vocal_language">Language</label>
    <select name="vocal_language" id="vocal_language">
      <option value="" selected>Auto Detect</option>
      <option value="en">English</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="bn">Bengali</option>
      <option value="hi">Hindi</option>
      <option value="ar">Arabic</option>
      <option value="th">Thai</option>
      <option value="vi">Vietnamese</option>
      <option value="id">Indonesian</option>
      <option value="tr">Turkish</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
    </select>
  </div>
</details>
