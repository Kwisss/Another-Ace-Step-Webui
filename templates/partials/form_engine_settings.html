<details>
  <summary>Engine Settings</summary>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="batch_size">Batch Size</label>
      <input type="number" name="batch_size" id="batch_size" value="2" min="1" max="8">
    </div>
    <div class="form-group">
      <label class="form-label" for="inference_steps">Steps</label>
      <input type="number" name="inference_steps" id="inference_steps" value="50" min="1" max="200">
    </div>
  </div>

  <div class="form-row" id="guidance_row">
    <div class="form-group">
      <label class="form-label" for="guidance_scale">Guidance Scale</label>
      <input type="number" name="guidance_scale_str" id="guidance_scale" value="7.0" step="0.1">
    </div>
    <div class="form-group">
      <label class="form-label" for="shift">Shift</label>
      <input type="number" name="shift_str" id="shift" value="3" step="0.1">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="seed">Seed</label>
      <input type="text" name="seed_str" id="seed" placeholder="-1 (random)">
    </div>
    <div class="form-group">
      <label class="form-label" for="audio_format">Format</label>
      <select name="audio_format" id="audio_format">
        <option value="mp3" selected>MP3</option>
        <option value="wav">WAV</option>
        <option value="flac">FLAC</option>
      </select>
    </div>
  </div>

  <hr class="section-divider">
  <div class="form-card-title" style="font-size:0.75rem;margin-bottom:0.75rem;opacity:0.7">Conditioning Scales</div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="caption_scale">Caption Scale</label>
      <div class="range-row">
        <input type="range" name="caption_scale" id="caption_scale"
               value="1.0" min="0.0" max="2.0" step="0.05"
               oninput="document.getElementById('caption_scale_val').innerText = parseFloat(this.value).toFixed(2)">
        <span id="caption_scale_val" class="range-readout">1.00</span>
      </div>
      <div class="form-hint">Strength of text-caption embeddings.</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="lyrics_scale">Lyrics Scale</label>
      <div class="range-row">
        <input type="range" name="lyrics_scale" id="lyrics_scale"
               value="1.0" min="0.0" max="2.0" step="0.05"
               oninput="document.getElementById('lyrics_scale_val').innerText = parseFloat(this.value).toFixed(2)">
        <span id="lyrics_scale_val" class="range-readout">1.00</span>
      </div>
      <div class="form-hint">Strength of lyric embeddings.</div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="llm_codes_scale">LLM Codes Scale</label>
      <div class="range-row">
        <input type="range" name="llm_codes_scale" id="llm_codes_scale"
               value="1.0" min="0.0" max="2.0" step="0.05"
               oninput="document.getElementById('llm_codes_scale_val').innerText = parseFloat(this.value).toFixed(2)">
        <span id="llm_codes_scale_val" class="range-readout">1.00</span>
      </div>
      <div class="form-hint">Strength of 5 Hz LLM structural-code hints.</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="audio_influence_scale">Audio Influence Scale</label>
      <div class="range-row">
        <input type="range" name="audio_influence_scale" id="audio_influence_scale"
               value="1.0" min="0.0" max="2.0" step="0.05"
               oninput="document.getElementById('audio_influence_scale_val').innerText = parseFloat(this.value).toFixed(2)">
        <span id="audio_influence_scale_val" class="range-readout">1.00</span>
      </div>
      <div class="form-hint">Strength of reference audio influence.</div>
    </div>
  </div>
</details>
